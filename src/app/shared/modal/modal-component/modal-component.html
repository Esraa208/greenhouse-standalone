
@if (isOpen()) {
    <dialog
      #dialogRef
      class="gh-modal"
      (click)="onBackdropClick($event)"
      (keydown)="onKeyDown($event)"
      tabindex="0"
      aria-modal="true"
      [attr.aria-label]="title()"
    >
      <div [class]="panelClass()">
        <!-- Header -->
        <div class="gh-modal__header">
          <div class="gh-modal__header-info">
            @if (iconEmoji()) {
              <div class="gh-modal__icon-wrap">{{ iconEmoji() }}</div>
            }
            <div>
              <h2 class="gh-modal__title">{{ title() }}</h2>
              @if (subtitle()) {
                <p class="gh-modal__subtitle">{{ subtitle() }}</p>
              }
            </div>
          </div>
          <button
            class="gh-modal__close"
            type="button"
            (click)="close()"
            aria-label="Close"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
  
        <!-- Body -->
        <div class="gh-modal__body">
          <ng-content />
        </div>
  
        <!-- Footer: either custom template or default slot -->
        @if (footerTemplate()) {
          <div class="gh-modal__footer">
            <ng-container *ngTemplateOutlet="footerTemplate()!" />
          </div>
        } @else if (showFooter()) {
          <div class="gh-modal__footer">
            <ng-content select="[slot=footer]" />
          </div>
        }
      </div>
    </dialog>
  }
